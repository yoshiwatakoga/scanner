<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>【動く診断アイコン版】QR在庫管理</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 5px; background: #f4f6f9; touch-action: manipulation; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    
    .top-info { display: flex; justify-content: space-between; align-items: center; background: #fff3cd; padding: 6px 12px; border-radius: 6px; border: 1px solid #ffeeba; font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
    
    /* === 【改善】ログ・アイコン表示エリア === */
    #log-container {
      margin: 5px 0;
      min-height: 65px;
      background: #e8f5e9;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #c8e6c9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px; /* アイコンと文字の間隔 */
    }
    #log-text { font-size: 1.05rem; font-weight: bold; color: #1a73e8; text-align: left; line-height: 1.3; }
    
    /* === 【新設】超軽量CSSアニメーションアイコンの定義 === */
    .icon-box { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative; }
    
    /* 1. 近づけてアニメーション（前後にグッグッと動く） */
    @keyframes zoomInOut {
      0% { transform: scale(0.85); }
      50% { transform: scale(1.15); }
      100% { transform: scale(0.85); }
    }
    .icon-zoom { animation: zoomInOut 1s infinite ease-in-out; }
    
    /* 2. 暗いアニメーション（パチパチ点滅） */
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .icon-blink { animation: blink 0.8s infinite ease-in-out; }

    /* 3. 読み取り成功時のハッピーダンス（弾む） */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .icon-bounce { animation: bounce 0.4s infinite ease-in-out; }
    /* ============================================== */

    .camera-wrapper {
      position: relative;
      width: 100%;
      max-width: 320px;
      margin: 5px auto;
      display: none;
      border-radius: 8px;
      border: 3px solid #2c3e50;
      background: #000;
      box-sizing: border-box;
      aspect-ratio: 4 / 3; 
      overflow: hidden; 
    }
    
    #canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .qr-guide-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; 
      height: 200px;
      border: 5px dashed #e67e22; 
      border-radius: 10px;
      opacity: 0.9;
      pointer-events: none;
      box-sizing: border-box;
      transition: border-color 0.2s, background-color 0.2s;
    }
    
    /* 通常時のスキャン線レーザー演出（これもCSSなので激軽です） */
    @keyframes laser {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
    .qr-guide-overlay::after {
      content: ""; position: absolute; left: 0; right: 0; height: 3px; background: rgba(46, 204, 113, 0.6);
      box-shadow: 0 0 8px rgba(46, 204, 113, 0.8); animation: laser 2s infinite linear;
    }
    
    /* 成功時に枠を緑にする */
    .qr-guide-overlay.success { border-color: #2ecc71; background: rgba(46, 204, 113, 0.15); }
    .qr-guide-overlay.success::after { display: none; } /* レーザー一時停止 */
    
    .btn { color: white; padding: 14px; font-size: 1.2rem; border: none; border-radius: 10px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; -webkit-appearance: none; }
    #cameraBtn { background: #28a745; }
    
    .history-container { margin-top: 12px; text-align: left; background: #2c3e50; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
    .history-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #34495e; padding-bottom: 4px; color: #bdc3c7; }
    #historyList { max-height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 0; margin: 0; list-style: none; }
    #historyList li { padding: 5px 0; border-bottom: 1px solid #34495e; line-height: 1.3; }
    .history-ok { color: #2ecc71; }
    .history-ng { color: #e74c3c; }
    .history-wait { color: #f1c40f; }

    .version-info { margin-top: 10px; font-size: 0.7rem; color: #7f8c8d; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="top-info">
    <span id="status">入力先: A列 (1)</span>
    <button onclick="moveToNextColumn()" style="background:#1a73e8; color:white; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; font-size:0.85rem;">➡ 次の列</button>
  </div>
  
  <div id="log-container">
    <div id="log-icon" class="icon-box">📷</div>
    <div id="log-text">最初にカメラを起動してください</div>
  </div>

  <button id="cameraBtn" onclick="startCamera()" class="btn">📷 カメラを起動する</button>

  <div class="camera-wrapper" id="cameraWrapper">
    <canvas id="canvas"></canvas>
    <div id="guideOverlay" class="qr-guide-overlay"></div>
  </div>
  
  <div class="history-container">
    <div class="history-title">⏱ 履歴（かざすだけで自動保存）</div>
    <ul id="historyList">
      <li style="color:#bdc3c7;">履歴はここに表示されます</li>
    </ul>
  </div>
  
  <div id="version" class="version-info"></div>
</div>

<script>
  const VERSION_TEXT = "バージョン: Ver 1.18 (CSSアニメーション診断版)";
  const GAS_URL = "https://script.google.com/a/macros/yoshifuku-unso.com/s/AKfycbw-BBGgev0lOZCKI_Vul073Z3QAQ-KBR-RBvBZQEkf--BaQIIupksPhzhE9bs30slwl/exec";

  const video = document.createElement("video");
  const canvasElement = document.getElementById("canvas");
  const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
  
  const guideOverlay = document.getElementById("guideOverlay");
  const logContainer = document.getElementById("log-container");
  const logIcon = document.getElementById("log-icon");
  const logText = document.getElementById("log-text");
  const statusDiv = document.getElementById("status");
  const cameraWrapper = document.getElementById("cameraWrapper");
  const historyList = document.getElementById("historyList");
  
  let currentColumn = 1; 
  let sendQueue = [];       
  let isSending = false;    

  let lastScannedData = "";
  let lastScannedTime = 0;

  document.getElementById("version").innerText = VERSION_TEXT;

  function getTimeStr() {
    const d = new Date();
    return "[" + String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "] ";
  }

  function addHistoryLog(message, type) {
    if (historyList.innerText === "履歴はここに表示されます") historyList.innerHTML = "";
    const li = document.createElement("li");
    li.innerHTML = getTimeStr() + message;
    if (type === "ok") li.className = "history-ok";
    if (type === "ng") li.className = "history-ng";
    if (type === "wait") li.className = "history-wait";
    historyList.insertBefore(li, historyList.firstChild);
  }

  async function startCamera() {
    logText.innerHTML = "カメラを起動しています...";
    try {
      const constraints = { 
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
        audio: false 
      };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      await video.play();

      const track = stream.getVideoTracks()[0];
      const capabilities = track.getCapabilities ? track.getCapabilities() : {};
      if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
      }
      
      document.getElementById("cameraBtn").style.display = "none";
      cameraWrapper.style.display = "block";
      
      requestAnimationFrame(autoScanLoop);
    } catch (err) {
      alert("ブラウザのカメラ使用を許可してください。");
      logIcon.innerHTML = "❌";
      logText.innerHTML = "起動失敗: " + err.name;
    }
  }

  function autoScanLoop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

      const vWidth = video.videoWidth;
      const vHeight = video.videoHeight;
      const cropSize = Math.min(vWidth, vHeight) * 0.6;
      const cropX = (vWidth - cropSize) / 2;
      const cropY = (vHeight - cropSize) / 2;

      const imageData = canvas.getImageData(cropX, cropY, cropSize, cropSize);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });

      if (code && code.data.trim() !== "") {
        const now = Date.now();
        if (code.data === lastScannedData && (now - lastScannedTime) < 3000) {
          logContainer.style.background = "#e8f5e9";
          logIcon.innerHTML = "⏳";
          logIcon.className = "icon-box"; 
          logText.style.color = "#7f8c8d";
          logText.innerHTML = "同じQRコードを検出中<br><small style='color:#95a5a6;'>二重送信を防ぐためロックしています</small>";
        } else {
          lastScannedData = code.data;
          lastScannedTime = now;

          if (navigator.vibrate) navigator.vibrate(100); 
          
          // 成功時の演出（枠を緑に、アイコンを弾ませる）
          guideOverlay.classList.add("success");
          logContainer.style.background = "#e8f5e9";
          logIcon.innerHTML = "🎉";
          logIcon.className = "icon-box icon-bounce";
          logText.style.color = "#28a745";
          logText.innerHTML = "読み込み成功！保存します";
          
          setTimeout(() => {
            guideOverlay.classList.remove("success");
          }, 400);

          const colLetter = String.fromCharCode(64 + currentColumn);
          sendQueue.push({ qrValue: code.data, col: currentColumn, label: colLetter });
          
          addHistoryLog("⏳ 予約追加: (" + colLetter + "列) " + code.data, "wait");
          processQueue();
        }
      } else {
        // 読めない時はエラー診断を実行
        diagnoseImageError(imageData);
      }
    }
    requestAnimationFrame(autoScanLoop);
  }

  // ★リアルタイム診断＆CSSアニメーション切り替え処理
  function diagnoseImageError(imageData) {
    if (sendQueue.length > 0) {
      logContainer.style.background = "#fff3cd";
      logIcon.innerHTML = "🚀";
      logIcon.className = "icon-box icon-bounce";
      logText.style.color = "#e67e22";
      logText.innerHTML = "GASへ通信中... (残り " + sendQueue.length + " 件)";
      return;
    }

    const data = imageData.data;
    let totalBrightness = 0;
    for (let i = 0; i < data.length; i += 40) {
      totalBrightness += (data[i] + data[i+1] + data[i+2]) / 3;
    }
    const avgBrightness = totalBrightness / (data.length / 40);

    // エラー内容に応じて「背景色」「アイコン」「動かし方」をリアルタイム切り替え
    if (avgBrightness < 45) {
      logContainer.style.background = "#eceff1"; // 灰色背景
      logIcon.innerHTML = "💡";
      logIcon.className = "icon-box icon-blink"; // パチパチ点滅
      logText.style.color = "#37474f";
      logText.innerHTML = "画面が暗すぎます！<br><small style='font-weight:normal; color:#78909c;'>明るい場所へ移動するか、ライトを当ててください</small>";
    } else {
      logContainer.style.background = "#fff3cd"; // 黄色背景
      logIcon.innerHTML = "📱";
      logIcon.className = "icon-box icon-zoom"; // 前後にウインウイン動く
      logText.style.color = "#d35400";
      logText.innerHTML = "枠にQRを【グッと近づけて】ね<br><small style='font-weight:normal; color:#e67e22;'>遠すぎるか、ピントがボケています</small>";
    }
  }

  function processQueue() {
    if (isSending || sendQueue.length === 0) return;
    isSending = true;

    const currentData = sendQueue[0];

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ qrValue: currentData.qrValue, col: currentData.col })
    })
    .then(() => {
      sendQueue.shift(); 
      addHistoryLog("✓ 保存完了: (" + currentData.label + "列) " + currentData.qrValue, "ok");
    })
    .catch((err) => {
      addHistoryLog("⚠️ 送信エラー。再試行します", "ng");
    })
    .finally(() => {
      isSending = false; 
      processQueue();
    });
  }

  function moveToNextColumn() {
    currentColumn++;
    statusDiv.innerHTML = "入力先: " + String.fromCharCode(64 + currentColumn) + "列 (" + currentColumn + ")";
    lastScannedData = ""; 
  }
</script>
</body>
</html>
