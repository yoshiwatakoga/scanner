<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>【URL固定版】QR在庫管理</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 5px; background: #f4f6f9; touch-action: manipulation; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    
    /* ステータス・作業者表示エリア */
    .top-info { background: #e3f2fd; padding: 8px 12px; border-radius: 6px; border: 1px solid #90caf9; font-weight: bold; font-size: 1.05rem; margin-bottom: 5px; color: #0d47a1; display: flex; justify-content: space-between; align-items: center; }
    .worker-badge { background: #0d47a1; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.9rem; }
    
    /* 手動切り替えボタン（URL指定がない時だけ表示） */
    #manual-nav { display: none; background: #fff3cd; padding: 6px; border-radius: 6px; border: 1px solid #ffeeba; margin-bottom: 5px; justify-content: space-between; align-items: center; }

    /* 文字入力エリア */
    .input-area { background: #f5f5f5; padding: 8px; border-radius: 6px; border: 1px solid #cfd8dc; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
    .input-area label { font-size: 0.85rem; font-weight: bold; color: #37474f; white-space: nowrap; }
    .input-area input { flex: 1; padding: 8px; font-size: 1rem; border: 1px solid #b0bec5; border-radius: 4px; box-sizing: border-box; }

    #log-container { margin: 5px 0; min-height: 65px; background: #e8f5e9; padding: 8px; border-radius: 6px; border: 1px solid #c8e6c9; display: flex; align-items: center; justify-content: center; gap: 15px; }
    #log-text { font-size: 1.05rem; font-weight: bold; color: #1a73e8; text-align: left; line-height: 1.3; }
    .icon-box { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative; }
    @keyframes zoomInOut { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(0.9); } }
    .icon-zoom { animation: zoomInOut 1.2s infinite ease-in-out; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .icon-blink { animation: blink 1s infinite ease-in-out; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .icon-bounce { animation: bounce 0.4s infinite ease-in-out; }
    .camera-wrapper { position: relative; width: 100%; max-width: 320px; margin: 5px auto; display: none; border-radius: 8px; border: 3px solid #2c3e50; background: #000; box-sizing: border-box; aspect-ratio: 4 / 3; overflow: hidden; }
    #canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    .qr-guide-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 5px dashed #e67e22; border-radius: 10px; opacity: 0.9; pointer-events: none; box-sizing: border-box; transition: border-color 0.2s, background-color 0.2s; }
    .qr-guide-overlay.success { border-color: #2ecc71; background: rgba(46, 204, 113, 0.15); }
    .btn { color: white; padding: 14px; font-size: 1.2rem; border: none; border-radius: 10px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; -webkit-appearance: none; }
    #cameraBtn { background: #28a745; }
    .history-container { margin-top: 12px; text-align: left; background: #2c3e50; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
    .history-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #34495e; padding-bottom: 4px; color: #bdc3c7; }
    #historyList { max-height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 0; margin: 0; list-style: none; }
    #historyList li { padding: 5px 0; border-bottom: 1px solid #34495e; line-height: 1.3; }
    .history-ok { color: #2ecc71; }
    .history-ng { color: #e74c3c; }
    .history-wait { color: #f1c40f; }
    .version-info { margin-top: 10px; font-size: 0.7rem; color: #7f8c8d; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="top-info">
    <span id="status">👤 作業者: 判定中...</span>
    <span id="sheet-info" class="worker-badge">端末1 シート</span>
  </div>

  <div id="manual-nav">
    <span style="font-size:0.8rem; color:#666;">テスト用切り替え:</span>
    <button onclick="changeWorkerManually('A')" style="background:#1a73e8; color:white; border:none; padding:4px 8px; border-radius:3px;">員A</button>
    <button onclick="changeWorkerManually('B')" style="background:#28a745; color:white; border:none; padding:4px 8px; border-radius:3px;">員B</button>
    <button onclick="changeWorkerManually('C')" style="background:#e67e22; color:white; border:none; padding:4px 8px; border-radius:3px;">員C</button>
  </div>

  <div class="input-area">
    <label for="memoInput">📍 位置コード:</label>
    <input type="text" id="memoInput" placeholder="例: A-1、左-手前 など">
  </div>
  
  <div id="log-container">
    <div id="log-icon" class="icon-box">📷</div>
    <div id="log-text">最初にカメラを起動してください</div>
  </div>

  <button id="cameraBtn" onclick="startCamera()" class="btn">📷 カメラを起動する</button>

  <div class="camera-wrapper" id="cameraWrapper">
    <canvas id="canvas"></canvas>
    <div id="guideOverlay" class="qr-guide-overlay"></div>
  </div>
  
  <div class="history-container">
    <div class="history-title">⏱ 履歴（URL自動割当モード）</div>
    <ul id="historyList">
      <li style="color:#bdc3c7;">履歴はここに表示されます</li>
    </ul>
  </div>
  
  <div id="version" class="version-info"></div>
</div>

<script>
  const VERSION_TEXT = "バージョン: Ver 1.30 (URL作業者固定・視認性向上版)";
  const GAS_URL = "https://script.google.com/macros/s/AKfycbywzU80a0Y7oa0Yb--navNWSdS4QBmIuctXnJ2AVIOhmm1ZrHEWpyLndroS91AMXx4/exec";

  const video = document.createElement("video");
  const canvasElement = document.getElementById("canvas");
  const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
  
  const guideOverlay = document.getElementById("guideOverlay");
  const logContainer = document.getElementById("log-container");
  const logIcon = document.getElementById("log-icon");
  const logText = document.getElementById("log-text");
  const statusDiv = document.getElementById("status");
  const sheetInfoSpan = document.getElementById("sheet-info");
  const cameraWrapper = document.getElementById("cameraWrapper");
  const historyList = document.getElementById("historyList");
  const memoInput = document.getElementById("memoInput");
  const manualNav = document.getElementById("manual-nav");
  
  // URLパラメータの解析ロジック
  let workerParam = new URLSearchParams(window.location.search).get('worker');
  let currentBoxNumber = 1;
  let currentStartColumn = 1; 
  let workerName = "作業員A";

  // URLパラメータに基づいて初期化
  initWorkerSettings();

  function initWorkerSettings() {
    if (workerParam) {
      workerParam = workerParam.toUpperCase();
      manualNav.style.display = "none"; // パラメータがある時は手動ボタンを隠す
    } else {
      workerParam = "A"; // パラメータがない場合のデフォルト
      manualNav.style.display = "flex"; // テスト用に手動ボタンを出す
    }

    if (workerParam === "B") {
      currentBoxNumber = 2; currentStartColumn = 6; workerName = "作業員B";
    } else if (workerParam === "C") {
      currentBoxNumber = 3; currentStartColumn = 11; workerName = "作業員C";
    } else {
      currentBoxNumber = 1; currentStartColumn = 1; workerName = "作業員A";
    }
    
    statusDiv.innerHTML = "👤 作業者: " + workerName;
    sheetInfoSpan.innerHTML = "端末" + currentBoxNumber + " シート";
  }

  // テスト用：手動で作業者を切り替える関数
  function changeWorkerManually(type) {
    workerParam = type;
    initWorkerSettings();
    lastScannedData = ""; 
    addHistoryLog("➔ テスト用切り替え: " + workerName + "に変更しました", "wait");
  }
  
  let sendQueue = [];       
  let isSending = false;    
  let lastScannedData = "";
  let lastScannedTime = 0;

  document.getElementById("version").innerText = VERSION_TEXT;

  function getTimeStr() {
    const d = new Date();
    return "[" + String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "." + String(d.getMilliseconds()).padStart(3, '0') + "] ";
  }

  function addHistoryLog(message, type) {
    if (historyList.innerText === "履歴はここに表示されます") historyList.innerHTML = "";
    const li = document.createElement("li");
    li.innerHTML = getTimeStr() + message;
    if (type === "ok") li.className = "history-ok";
    if (type === "ng") li.className = "history-ng";
    if (type === "wait") li.className = "history-wait";
    historyList.insertBefore(li, historyList.firstChild);
  }

  async function startCamera() {
    logText.innerHTML = "カメラを起動しています...";
    try {
      const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      await video.play();
      document.getElementById("cameraBtn").style.display = "none";
      cameraWrapper.style.display = "block";
      requestAnimationFrame(autoScanLoop);
    } catch (err) {
      alert("カメラの使用を許可してください。");
    }
  }

  function autoScanLoop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
      const cropSize = Math.min(video.videoWidth, video.videoHeight) * 0.6;
      const cropX = (video.videoWidth - cropSize) / 2; const cropY = (video.videoHeight - cropSize) / 2;
      const imageData = canvas.getImageData(cropX, cropY, cropSize, cropSize);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });

      if (code && code.data.trim() !== "") {
        const now = Date.now();
        if (code.data === lastScannedData && (now - lastScannedTime) < 3000) {
          logContainer.style.background = "#e8f5e9"; logIcon.innerHTML = "⏳"; logIcon.className = "icon-box"; 
          logText.style.color = "#7f8c8d"; logText.innerHTML = "同じQRコードを検出中<br><small style='color:#95a5a6;'>連投防止ロック中</small>";
        } else {
          lastScannedData = code.data; lastScannedTime = now;
          if (navigator.vibrate) navigator.vibrate(100); 
          
          const d = new Date();
          const clientTimeStr = d.getFullYear() + "/" + String(d.getMonth() + 1).padStart(2, '0') + "/" + String(d.getDate()).padStart(2, '0') + " " +
                                String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "." +
                                String(d.getMilliseconds()).padStart(3, '0');

          guideOverlay.classList.add("success");
          logContainer.style.background = "#e8f5e9"; logIcon.innerHTML = "🎉"; logIcon.className = "icon-box icon-bounce";
          logText.style.color = "#28a745"; logText.innerHTML = "成功！" + workerName + "のシートへ保存";
          setTimeout(() => { guideOverlay.classList.remove("success"); }, 400);

          const userMemo = memoInput.value.trim();

          // GAS側へ、固定されたパラメータ情報を乗せてキューに追加
          sendQueue.push({ qrValue: code.data, col: currentStartColumn, clientTime: clientTimeStr, memo: userMemo, worker: workerName });
          addHistoryLog("⏳ 送信中: " + code.data.substring(0,12) + "...", "wait");
          processQueue();
        }
      } else {
        diagnoseImageError(imageData);
      }
    }
    requestAnimationFrame(autoScanLoop);
  }

  function diagnoseImageError(imageData) {
    if (sendQueue.length > 0) {
      logContainer.style.background = "#fff3cd"; logIcon.innerHTML = "🚀"; logIcon.className = "icon-box icon-bounce";
      logText.style.color = "#e67e22"; logText.innerHTML = "GASへ通信中... (残り " + sendQueue.length + " 件)";
      return;
    }
    logContainer.style.background = "#fff3cd"; logIcon.innerHTML = "🔍"; logIcon.className = "icon-box icon-zoom";
    logText.style.color = "#d35400"; logText.innerHTML = "枠内にQRコードを映してください<br><small style='color:#7f8c8d;'>ログイン中: " + workerName + "</small>";
  }

  function processQueue() {
    if (isSending || sendQueue.length === 0) return;
    isSending = true;
    const currentData = sendQueue[0];
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ qrValue: currentData.qrValue, col: currentData.col, clientTime: currentData.clientTime, memo: currentData.memo })
    })
    .then((response) => response.json())
    .then((res) => {
      sendQueue.shift();
      addHistoryLog("✓ 保存完了: (" + currentData.worker + "専用シート)", "ok");
    })
    .catch((err) => { addHistoryLog("⚠️ 再試行します", "ng"); })
    .finally(() => { isSending = false; processQueue(); });
  }
</script>
</body>
</html>
