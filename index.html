<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超速QR在庫管理スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 15px; background: #f4f6f9; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { color: #1a73e8; margin-top: 0; }
    #canvas { width: 100%; max-width: 400px; border: 3px solid #1a73e8; border-radius: 8px; display: none; margin: 10px auto; }
    .btn { color: white; padding: 20px; font-size: 1.3rem; border: none; border-radius: 10px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; }
    #cameraBtn { background: #28a745; }
    #nextBtn { background: #1a73e8; }
    #status { margin: 15px 0; font-size: 1.3rem; font-weight: bold; color: #333; background: #e8f0fe; padding: 12px; border-radius: 6px; }
  </style>
</head>
<body>

<div class="container">
  <h2>QR在庫管理スキャナー</h2>
  <div id="status">現在の入力先: A列 (1)</div>
  <button id="cameraBtn" onclick="startCamera()" class="btn">📷 スキャン開始</button>
  <canvas id="canvas"></canvas>
  <button id="nextBtn" onclick="moveToNextColumn()" class="btn">➡ 次の品目（列）へ移動</button>
  <div id="log" style="margin-top:15px; font-weight:bold; color:#28a745;"></div>
</div>

<script>
  // 教えていただいたGASのURLをあらかじめ設定してあります
  const GAS_URL = "https://script.google.com/a/macros/yoshifuku-unso.com/s/AKfycbw-BBGgev0lOZCKI_Vul073Z3QAQ-KBR-RBvBZQEkf--BaQIIupksPhzhE9bs30slwl/exec";

  const video = document.createElement("video");
  const canvasElement = document.getElementById("canvas");
  
  // 高速化設定（willReadFrequently: true）を有効化
  const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
  
  const logDiv = document.getElementById("log");
  const statusDiv = document.getElementById("status");
  let currentColumn = 1; 
  let lastReadCode = ""; 
  let isProcessing = false; // 重複送信ガード

  async function startCamera() {
    logDiv.innerHTML = "カメラを起動しています...";
    try {
      // 読み取りに最適な解像度と高フレームレート(FPS)を要求
      const constraints = { 
        video: { 
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60, max: 60 } // 可能なら60fps、最高速度を要求
        }, 
        audio: false 
      };
      
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      await video.play();
      
      document.getElementById("cameraBtn").style.display = "none";
      canvasElement.style.display = "block";
      
      // アニメーションループ起動
      requestAnimationFrame(tick);
      logDiv.innerHTML = "✓ バーコード・QRを映してください。";
    } catch (err) {
      alert("ブラウザのカメラ使用を許可してください。");
      logDiv.innerHTML = "❌ 起動失敗: " + err.name;
    }
  }

  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.height = video.videoHeight;
      canvasElement.width = video.videoWidth;
      
      // カメラ映像を高速でキャンバスに描画
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
      
      const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
      
      // QRコードの超速解析を実行
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

      if (code && code.data !== lastReadCode && !isProcessing) {
        lastReadCode = code.data;
        isProcessing = true; 
        
        // 読み取り成功時にスマホを「ブッ」と短く振動させる（対応機種のみ）
        if (navigator.vibrate) navigator.vibrate(100);

        logDiv.style.color = "#1a73e8";
        logDiv.innerHTML = "シートに書き込み中...";

        // GASへデータを送信
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.
