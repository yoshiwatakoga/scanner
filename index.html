<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>【完全決戦版】QR在庫管理スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background: #f4f6f9; touch-action: manipulation; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { color: #2c3e50; margin: 5px 0 10px 0; font-size: 1.5rem; }
    
    #status { margin: 5px 0; font-size: 1.1rem; font-weight: bold; color: #333; background: #fff3cd; padding: 8px; border-radius: 6px; border: 1px solid #ffeeba; }
    #log { margin: 8px 0; font-size: 1.3rem; font-weight: bold; color: #1a73e8; min-height: 44px; background: #e8f5e9; padding: 8px; border-radius: 6px; border: 1px solid #c8e6c9; display: flex; align-items: center; justify-content: center; }
    
    .camera-wrapper { position: relative; width: 100%; max-width: 360px; margin: 10px auto; display: none; }
    #canvas { width: 100%; height: 240px; object-fit: cover; border: 3px solid #2c3e50; border-radius: 10px; display: block; }
    .qr-guide-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 5px dashed #e67e22; border-radius: 15px; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4); opacity: 0.9; pointer-events: none; box-sizing: border-box; }
    
    .btn { color: white; padding: 15px; font-size: 1.2rem; border: none; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; -webkit-appearance: none; }
    #cameraBtn { background: #28a745; }
    #nextBtn { background: #1a73e8; margin-top: 10px; }
    
    #scanTriggerBtn { background: #e67e22; padding: 18px; font-size: 1.4rem; display: none; box-shadow: 0 4px 15px rgba(230,126,34,0.5); }
    #scanTriggerBtn:active { background: #d35400; transform: scale(0.98); }
    
    .history-container { margin-top: 15px; text-align: left; background: #2c3e50; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
    .history-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #34495e; padding-bottom: 3px; color: #bdc3c7; }
    #historyList { max-height: 120px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 0; margin: 0; list-style: none; }
    #historyList li { padding: 4px 0; border-bottom: 1px solid #34495e; line-height: 1.2; }
    .history-ok { color: #2ecc71; }
    .history-ng { color: #e74c3c; }
    .history-wait { color: #f1c40f; }

    .version-info { margin-top: 15px; font-size: 0.75rem; color: #7f8c8d; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <h2>QR在庫管理（Ver1.12）</h2>
  
  <div id="status">入力先: A列 (1)</div>
  <div id="log">📷 最初にカメラを起動してください</div>

  <button id="cameraBtn" onclick="startCamera()" class="btn">📷 カメラを起動する</button>

  <div class="camera-wrapper" id="cameraWrapper">
    <canvas id="canvas"></canvas>
    <div class="qr-guide-overlay"></div>
  </div>

  <button id="scanTriggerBtn" onclick="takeSnapshotAndScan()" class="btn">📸 枠に合わせてスキャン！</button>
  <button id="nextBtn" onclick="moveToNextColumn()" class="btn">➡ 次の品目へ移動</button>
  
  <div class="history-container">
    <div class="history-title">⏱ リアルタイム動作履歴（新しい順）</div>
    <ul id="historyList">
      <li style="color:#bdc3c7;">履歴はここに表示されます</li>
    </ul>
  </div>
  
  <div id="version" class="version-info"></div>
</div>

<script>
  const VERSION_TEXT = "バージョン: Ver 1.12 (高解像度スナップ撮影版)";
  const GAS_URL = "https://script.google.com/a/macros/yoshifuku-unso.com/s/AKfycbw-BBGgev0lOZCKI_Vul073Z3QAQ-KBR-RBvBZQEkf--BaQIIupksPhzhE9bs30slwl/exec";

  const video = document.createElement("video");
  const canvasElement = document.getElementById("canvas");
  const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
  
  // ★高解像度写真キャプチャ用の隠しキャンバス（画面には映りません）
  const hiddenCanvas = document.createElement("canvas");
  const hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });
  
  const logDiv = document.getElementById("log");
  const statusDiv = document.getElementById("status");
  const cameraWrapper = document.getElementById("cameraWrapper");
  const historyList = document.getElementById("historyList");
  
  let currentColumn = 1; 
  let sendQueue = [];       
  let isSending = false;    

  document.getElementById("version").innerText = VERSION_TEXT;

  function getTimeStr() {
    const d = new Date();
    return "[" + String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "] ";
  }

  function addHistoryLog(message, type) {
    if (historyList.innerText === "履歴はここに表示されます") historyList.innerHTML = "";
    const li = document.createElement("li");
    li.innerHTML = getTimeStr() + message;
    if (type === "ok") li.className = "history-ok";
    if (type === "ng") li.className = "history-ng";
    if (type === "wait") li.className = "history-wait";
    historyList.insertBefore(li, historyList.firstChild);
  }

  async function startCamera() {
    logDiv.innerHTML = "カメラを起動しています...";
    try {
      // ★フルHD（1920x1080）の最高画質ストリームを確保
      const constraints = { 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }, 
        audio: false 
      };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      await video.play();

      const track = stream.getVideoTracks()[0];
      const capabilities = track.getCapabilities ? track.getCapabilities() : {};
      if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
      }
      
      document.getElementById("cameraBtn").style.display = "none";
      cameraWrapper.style.display = "block";
      document.getElementById("scanTriggerBtn").style.display = "block"; 
      
      requestAnimationFrame(renderVideoOnly);
      logDiv.innerHTML = "✓ オレンジの枠にQRを合わせてボタンを押してね";
    } catch (err) {
      alert("ブラウザのカメラ使用を許可してください。");
      logDiv.innerHTML = "❌ 起動失敗: " + err.name;
    }
  }

  // 画面表示用ループ：スマホに優しく、軽量なサイズで描画（これでぬるぬる化）
  function renderVideoOnly() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.height = 480; 
      canvasElement.width = 640; 
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
    }
    requestAnimationFrame(renderVideoOnly);
  }

  // ★ボタンが押された瞬間の処理（隠し高解像度スナップショット方式）
  function takeSnapshotAndScan() {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

    // ボタンが押されたその瞬間だけ、隠しキャンバスに「100%劣化なしのフルサイズ最高画質」を切り出す
    hiddenCanvas.width = video.videoWidth;
    hiddenCanvas.height = video.videoHeight;
    hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

    // 最高クオリティの画像データでQRを解析（モザイクが絶対に潰れません）
    const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });

    if (code && code.data.trim() !== "") {
      if (navigator.vibrate) navigator.vibrate(80); 
      
      const colLetter = String.fromCharCode(64 + currentColumn);
      sendQueue.push({ qrValue: code.data, col: currentColumn, label: colLetter });
      
      addHistoryLog("⏳ 予約追加: (" + colLetter + "列) " + code.data, "wait");
      processQueue();
    } else {
      if (navigator.vibrate) navigator.vibrate([40, 40]); 
      logDiv.style.color = "#dc3545";
      logDiv.innerHTML = "❌ QRコードが見つかりません";
      addHistoryLog("❌ NG: QRが見つかりません (撮り直し)", "ng");
    }
  }

  function processQueue() {
    if (isSending || sendQueue.length === 0) {
      updateStatusDisplay();
      return;
    }

    isSending = true;
    updateStatusDisplay();

    const currentData = sendQueue[0];

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ qrValue: currentData.qrValue, col: currentData.col })
    })
    .then(() => {
      sendQueue.shift(); 
      addHistoryLog("✓ 保存完了: (" + currentData.label + "列) " + currentData.qrValue, "ok");
    })
    .catch((err) => {
      addHistoryLog("⚠️ 送信エラー。再試行します", "ng");
    })
    .finally(() => {
      isSending = false; 
      processQueue();
    });
  }

  function updateStatusDisplay() {
    if (sendQueue.length > 0) {
      logDiv.style.color = "#e67e22";
      logDiv.innerHTML = "⏳ 送信中... (残り " + sendQueue.length + " 件)";
    } else {
      logDiv.style.color = "#28a745";
      logDiv.innerHTML = "✓ すべての保存が完了しました";
    }
  }

  function moveToNextColumn() {
    currentColumn++;
    statusDiv.innerHTML = "入力先: " + String.fromCharCode(64 + currentColumn) + "列 (" + currentColumn + ")";
  }
</script>
</body>
</html>
