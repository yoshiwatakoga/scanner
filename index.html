<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR在庫管理 - Ver 1.90</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 5px; background: #f4f6f9; touch-action: manipulation; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    
    /* 言語切り替え */
    .lang-area { display: flex; gap: 8px; margin-bottom: 8px; }
    .lang-btn { flex: 1; padding: 8px; font-size: 1rem; font-weight: bold; border: 2px solid #ccc; border-radius: 6px; cursor: pointer; background: #f5f5f5; -webkit-appearance: none; }
    .lang-btn.active { background: #37474f; color: white; border-color: #212121; }
    
    /* 現場ロケーション選択UI */
    .location-box { background: #fff; border: 2px solid #cfd8dc; border-radius: 8px; padding: 8px; margin-bottom: 8px; text-align: left; box-sizing: border-box; }
    .loc-title { font-size: 0.85rem; font-weight: bold; color: #546e7a; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .btn-grid { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
    .grid-btn { flex: 1; min-width: 40px; padding: 10px 4px; font-size: 0.95rem; font-weight: bold; border: 1px solid #b0bec5; border-radius: 6px; background: #ffffff; cursor: pointer; text-align: center; -webkit-appearance: none; }
    .grid-btn.active { background: #1a73e8; color: white; border-color: #0d47a1; box-shadow: 0 2px 6px rgba(26,115,232,0.3); }
    .grid-btn.active-lr { background: #28a745; color: white; border-color: #1e7e34; box-shadow: 0 2px 6px rgba(40,167,69,0.3); }
    
    /* 現在の位置表示・ステップボタン */
    .current-loc-display { background: #eceff1; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 6px; border: 1px dashed #b0bec5; }
    .current-loc-text { font-size: 1.15rem; font-weight: bold; color: #1a73e8; }
    .step-control-row { display: flex; gap: 6px; }
    .step-btn { flex: 1; padding: 14px 4px; font-size: 1.05rem; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; -webkit-appearance: none; box-shadow: 0 3px 5px rgba(0,0,0,0.15); }
    .btn-minus10 { background: #e53935; }
    .btn-minus1 { background: #ef5350; }
    .btn-plus1 { background: #26a69a; }
    .btn-plus10 { background: #00897b; }
    .step-btn:active { opacity: 0.8; transform: translateY(1px); }

    /* システムステータス表示 */
    #log-container { margin: 5px 0; min-height: 60px; background: #f5f5f5; padding: 8px; border-radius: 6px; border: 1px solid #cfd8dc; display: flex; align-items: center; justify-content: center; gap: 12px; }
    #log-text { font-size: 1rem; font-weight: bold; color: #37474f; text-align: left; line-height: 1.3; }
    .icon-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    
    /* カメラ表示エリア（熱中症カメラと同一の標準ビデオ常時流し方式） */
    .camera-wrapper { position: relative; width: 100%; max-width: 340px; margin: 5px auto; display: none; border-radius: 10px; border: 3px solid #37474f; background: #000; box-sizing: border-box; aspect-ratio: 4 / 3; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; } /* スキャン計算用に裏で隠す */
    
    .qr-guide-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border: 5px dashed #e67e22; border-radius: 10px; opacity: 0.8; pointer-events: none; box-sizing: border-box; transition: all 0.2s; }
    .qr-guide-overlay.success { border-color: #2ecc71; background: rgba(46, 204, 113, 0.2); }
    
    .btn-main { color: white; padding: 14px; font-size: 1.2rem; border: none; border-radius: 10px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; -webkit-appearance: none; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }
    #cameraBtn { background: #37474f; }
    #nextRowBtn { background: #607d8b; display: none; margin-bottom: 5px; } 
    
    /* 履歴エリア */
    .history-container { margin-top: 10px; text-align: left; background: #2c3e50; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
    .history-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #34495e; padding-bottom: 4px; color: #bdc3c7; }
    #historyList { max-height: 130px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 0; margin: 0; list-style: none; }
    #historyList li { padding: 4px 0; border-bottom: 1px solid #34495e; line-height: 1.3; }
    .history-ok { color: #2ecc71; }
    .history-ng { color: #e74c3c; }
    .history-wait { color: #f1c40f; }
    .version-info { margin-top: 8px; font-size: 0.7rem; color: #7f8c8d; text-align: center; }
    .nav-link { display: block; margin-top: 12px; color: #1a73e8; text-decoration: none; font-size: 0.95rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="lang-area">
    <button id="langJaBtn" class="lang-btn active" onclick="changeLanguage('ja')">🇯🇵 日本語</button>
    <button id="langViBtn" class="lang-btn" onclick="changeLanguage('vi')">🇻🇳 Tiếng Việt</button>
  </div>

  <div class="location-box">
    <div class="loc-title"><span id="txt-select-wh">① 倉庫を選択</span></div>
    <div class="btn-grid" id="wh-grid-container">
      <button class="grid-btn active" onclick="selectWarehouse(1)">1</button>
      <button class="grid-btn" onclick="selectWarehouse(2)">2</button>
      <button class="grid-btn" onclick="selectWarehouse(3)">3</button>
      <button class="grid-btn" onclick="selectWarehouse(4)">4</button>
      <button class="grid-btn" onclick="selectWarehouse(5)">5</button>
      <button class="grid-btn" onclick="selectWarehouse(6)">6</button>
      <button class="grid-btn" onclick="selectWarehouse(7)">7</button>
      <button class="grid-btn" onclick="selectWarehouse(8)">8</button>
      <button class="grid-btn" onclick="selectWarehouse(9)">9</button>
    </div>

    <div class="loc-title"><span id="txt-select-lr">② 左右を選択</span></div>
    <div class="btn-grid">
      <button id="btn-left" class="grid-btn active-lr" onclick="selectLR('左側')">⬅️ 左側 (Left)</button>
      <button id="btn-right" class="grid-btn" onclick="selectLR('右側')">右側 (Right) ➡️</button>
    </div>

    <div class="loc-title"><span id="txt-select-row">③ 列（ブロック）番号の調整</span></div>
    <div class="current-loc-display">
      <div class="current-loc-text" id="lbl-current-full-loc">1号倉庫 - 左側 - 1列目</div>
    </div>
    <div class="step-control-row">
      <button class="step-btn btn-minus10" onclick="adjustRow(-10)">-10</button>
      <button class="step-btn btn-minus1" onclick="adjustRow(-1)">-1</button>
      <button class="step-btn btn-plus1" onclick="adjustRow(1)">+1</button>
      <button class="step-btn btn-plus10" onclick="adjustRow(10)">+10</button>
    </div>
  </div>
  
  <div id="log-container">
    <div id="log-icon" class="icon-box">🔍</div>
    <div id="log-text">最初にカメラを起動してください</div>
  </div>

  <button id="cameraBtn" onclick="startCamera()" class="btn-main">📸 カメラを起動する</button>

  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" autoplay playsinline muted></video>
    <div id="guideOverlay" class="qr-guide-overlay"></div>
  </div>
  
  <button id="nextRowBtn" onclick="moveToNextRowManual()" class="btn-main">⏭️ 空白のまま今の位置をスキップ</button>
  
  <div class="history-container">
    <div id="lbl-history-title" class="history-title">⏱ 履歴</div>
    <ul id="historyList">
      <li id="lbl-history-empty" style="color:#bdc3c7;">履歴はここに表示されます</li>
    </ul>
  </div>

  <a href="search.html" class="nav-link">🗺️ 倉庫マップ図面・在庫検索を開く</a>
  <div id="version" class="version-info"></div>
</div>

<canvas id="canvas"></canvas>

<script>
  const VERSION_TEXT = "バージョン: Ver 1.90 (ロケーション選択UI・カメラサクサク版)";
  
  // ★GASのウェブアプリURLをここに貼り付けてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwn8KmXLdJFWUG3zRi_HJrGvlcuKIut0od8Dzv-AO5vOjM2puq9IdpBbI_k_IXlyAkD/exec";

  let video, canvasElement, canvas;
  let guideOverlay, logContainer, logIcon, logText, cameraWrapper, historyList, nextRowBtn;
  
  // 選択中の位置管理用変数
  let selectedWarehouse = 1;
  let selectedLR = "左側";
  let selectedRow = 1;

  let sendQueue = [];       
  let isSending = false;    
  let lastScannedData = "";
  let lastScannedTime = 0;
  let scanCount = 0;
  let currentLang = "ja";
  let localStream = null;

  // 多言語文言設定
  const i18n = {
    ja: {
      t_wh: "① 倉庫を選択", t_lr: "② 左右を選択", t_row: "③ 列（ブロック）番号の調整",
      init_cam: "最初にカメラを起動してください", start_cam_btn: "📸 カメラを起動する", next_row_btn: "⏭️ 空白のまま今の位置をスキップ",
      history_title: "⏱ 履歴 (リアルタイム一括同期版)", history_empty: "履歴はここに表示されます",
      scan_ok: "スキャン完了！保存しました", dup_err: "同じQRコードを検出（スキップしました）",
      cam_guide: "枠内にQRコードを映してください", cam_sending: "GASへ一括自動送信中...", cam_waiting: "送信待ちデータが {count} 件あります",
      log_skip: "⏭️ スキップ: 空白データを送信キューに入れました", log_hold: "📥 保持: ",
      log_sync_ok: "✓ 送信完了: {count} 件データを同期しました", log_sync_err: "⚠️ 通信エラー：再試行します",
      unit_wh: "号倉庫", unit_row: "列目", left: "左側", right: "右側"
    },
    vi: {
      t_wh: "① Chọn kho (Warehouse)", t_lr: "② Chọn bên (Left / Right)", t_row: "③ Điều chỉnh số hàng (Block row)",
      init_cam: "Vui lòng bật máy ảnh trước", start_cam_btn: "📸 Bật máy ảnh", next_row_btn: "⏭️ Bỏ qua vị trí này (Để trống)",
      history_title: "⏱ Lịch sử quét dữ liệu", history_empty: "Lịch sử quét sẽ hiển thị ở đây",
      scan_ok: "Quét thành công! Đang lưu", dup_err: "Phát hiện mã QR trùng lặp (Đã bỏ qua)",
      cam_guide: "Vui lòng đưa mã QR vào khung", cam_sending: "Đang đồng bộ dữ liệu...", cam_waiting: "Có {count} dữ liệu đang chờ gửi",
      log_skip: "⏭️ Bỏ qua: Đã thêm dữ liệu trống vào hàng đợi", log_hold: "📥 Đang giữ: ",
      log_sync_ok: "✓ Đã gửi thành công: {count} dữ liệu", log_sync_err: "⚠️ Lỗi kết nối: Sẽ thử lại",
      unit_wh: "Kho số ", unit_row: "Hàng số ", left: "Bên Trái", right: "Bên Phải"
    }
  };

  window.addEventListener('DOMContentLoaded', () => {
    video = document.getElementById("video");
    canvasElement = document.getElementById("canvas");
    canvas = canvasElement.getContext("2d", { willReadFrequently: true });
    
    guideOverlay = document.getElementById("guideOverlay");
    logContainer = document.getElementById("log-container");
    logIcon = document.getElementById("log-icon");
    logText = document.getElementById("log-text");
    cameraWrapper = document.getElementById("cameraWrapper");
    historyList = document.getElementById("historyList");
    nextRowBtn = document.getElementById("nextRowBtn");
    
    updateLocationDisplay();
    changeLanguage('ja');
    document.getElementById("version").innerText = VERSION_TEXT;
    setInterval(processQueueBulk, 3000);
  });

  // 倉庫選択
  function selectWarehouse(num) {
    selectedWarehouse = num;
    const buttons = document.querySelectorAll("#wh-grid-container .grid-btn");
    buttons.forEach((btn, idx) => {
      if ((idx + 1) === num) { btn.classList.add("active"); } else { btn.classList.remove("active"); }
    });
    updateLocationDisplay();
  }

  // 左右選択
  function selectLR(side) {
    selectedLR = side;
    const btnLeft = document.getElementById("btn-left");
    const btnRight = document.getElementById("btn-right");
    if (side === "左側") {
      btnLeft.classList.add("active-lr"); btnRight.classList.remove("active-lr");
    } else {
      btnLeft.classList.remove("active-lr"); btnRight.classList.add("active-lr");
    }
    updateLocationDisplay();
  }

  // 列の調整（プラマイボタン）
  function adjustRow(amount) {
    selectedRow += amount;
    if (selectedRow < 1) selectedRow = 1; // 1未満にはならないストッパー
    updateLocationDisplay();
  }

  // 表示の更新（スプシ送信用文字列の組み立て）
  function updateLocationDisplay() {
    const displayElement = document.getElementById("lbl-current-full-loc");
    const whText = currentLang === "ja" ? `${selectedWarehouse}${i18n[currentLang].unit_wh}` : `${i18n[currentLang].unit_wh}${selectedWarehouse}`;
    const lrText = selectedLR === "左側" ? i18n[currentLang].left : i18n[currentLang].right;
    const rowText = currentLang === "ja" ? `${selectedRow}${i18n[currentLang].unit_row}` : `${i18n[currentLang].unit_row}${selectedRow}`;
    
    displayElement.innerText = `${whText} - ${lrText} - ${rowText}`;
  }

  // スプシ書き込み用の一意な位置コードを生成する関数
  function generateLocationCode() {
    const sideCode = selectedLR === "左側" ? "左" : "右";
    // スプシに「3号-右-17」のようなシンプルでわかりやすい形式で送るよう結合します
    return `${selectedWarehouse}号-${sideCode}-${selectedRow}`;
  }

  function changeLanguage(lang) {
    currentLang = lang;
    document.getElementById("langJaBtn").className = (lang === 'ja') ? "lang-btn active" : "lang-btn";
    document.getElementById("langViBtn").className = (lang === 'vi') ? "lang-btn active" : "lang-btn";
    
    document.getElementById("txt-select-wh").innerText = i18n[lang].t_wh;
    document.getElementById("txt-select-lr").innerText = i18n[lang].t_lr;
    document.getElementById("txt-select-row").innerText = i18n[lang].t_row;
    document.getElementById("cameraBtn").innerText = i18n[lang].start_cam_btn;
    document.getElementById("nextRowBtn").innerText = i18n[lang].next_row_btn;
    document.getElementById("lbl-history-title").innerText = i18n[lang].history_title;
    
    if(document.getElementById("lbl-history-empty")) { document.getElementById("lbl-history-empty").innerText = i18n[lang].history_empty; }
    if(video && video.srcObject == null) { logText.innerText = i18n[lang].init_cam; }
    
    updateLocationDisplay();
  }

  function speakCount(number) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel(); 
      const utterance = new SpeechSynthesisUtterance(number.toString());
      utterance.lang = (currentLang === "vi") ? "vi-VN" : "ja-JP";
      window.speechSynthesis.speak(utterance);
    }
  }

  function parseQrContent(rawText) {
    let modelCode = ""; let serialNumber = "";
    const parts = rawText.replace(/[\s　]+/g, " ").trim().split(" ");
    if (parts.length >= 8) {
      modelCode = parts[5]; serialNumber = parts[6].replace("機番", ""); 
    } else {
      modelCode = parts[0] || ""; serialNumber = rawText.substring(0, 10);
    }
    return { modelCode, serialNumber };
  }

  // スキップボタンが押された時
  function moveToNextRowManual() {
    const now = Date.now();
    lastScannedTime = now; lastScannedData = ""; triggerVibrate(); 
    addHistoryLog(i18n[currentLang].log_skip, "wait");
    
    const clientTimeStr = getFormattedDate();
    const locCode = generateLocationCode(); // 例：「3号-右-1」
    
    // 常に1シート目（カラム1番）に書き込む初期設定
    sendQueue.push({ qrValue: "（空白スキップ）", modelCode: "（空白）", serialNumber: "（空白）", col: 1, clientTime: clientTimeStr, memo: locCode });
  }

  function getFormattedDate() {
    const d = new Date();
    return d.getFullYear() + "/" + String(d.getMonth() + 1).padStart(2, '0') + "/" + String(d.getDate()).padStart(2, '0') + " " +
           String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "." +
           String(d.getMilliseconds()).padStart(3, '0');
  }

  function addHistoryLog(message, type) {
    if (!historyList) return;
    if (historyList.innerText === i18n[currentLang].history_empty) historyList.innerHTML = "";
    const li = document.createElement("li");
    const d = new Date();
    li.innerHTML = "[" + String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0') + "] " + message;
    if (type === "ok") li.className = "history-ok";
    if (type === "ng") li.className = "history-ng";
    if (type === "wait") li.className = "history-wait";
    historyList.insertBefore(li, historyList.firstChild);
  }

  function triggerVibrate() {
    if (navigator.vibrate) { navigator.vibrate(0); setTimeout(() => { navigator.vibrate([120]); }, 10); }
  }

  // カメラ起動（熱中症カメラベースの一新方式）
  async function startCamera() {
    logText.innerHTML = "Camera starting...";
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
    }

    try {
      // 映像プレビュー負荷を劇的に下げる理想値を設定
      const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      localStream = stream;
      
      video.srcObject = stream;
      document.getElementById("cameraBtn").style.display = "none"; 
      cameraWrapper.style.display = "block"; 
      nextRowBtn.style.display = "block";
      
      video.onloadedmetadata = () => {
        requestAnimationFrame(autoScanLoop);
      };
    } catch (err) { 
      console.error(err);
      alert("カメラの起動に失敗しました。SafariやChromeブラウザ等で開き直してください。"); 
      logText.innerHTML = "⚠️ カメラの起動エラー";
    }
  }

  // 解析ループ
  function autoScanLoop() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.width = 640; // 解析用のみ小さなサイズに縮小してスマホのCPU不可を激減させる
      canvasElement.height = 480;
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
      
      const cropSize = Math.min(canvasElement.width, canvasElement.height) * 0.7;
      const cropX = (canvasElement.width - cropSize) / 2; 
      const cropY = (canvasElement.height - cropSize) / 2;
      const imageData = canvas.getImageData(cropX, cropY, cropSize, cropSize);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });

      if (code && code.data.trim() !== "") {
        const now = Date.now();
        if (code.data === lastScannedData && (now - lastScannedTime) < 3000) {
          logContainer.style.background = "#fff3cd"; logIcon.innerHTML = "⏳"; 
          logText.innerHTML = i18n[currentLang].dup_err;
          if (now - lastScannedTime > 2500) { triggerVibrate(); }
        } else {
          lastScannedData = code.data; lastScannedTime = now;
          triggerVibrate();
          scanCount++;
          speakCount(scanCount);
          
          const parsed = parseQrContent(code.data);
          const clientTimeStr = getFormattedDate();
          const locCode = generateLocationCode(); // 現在選択中のロケーションコード

          guideOverlay.classList.add("success");
          logContainer.style.background = "#e8f5e9"; logIcon.innerHTML = "📷"; 
          logText.style.color = "#28a745"; logText.innerHTML = i18n[currentLang].scan_ok + " (No." + scanCount + ")";
          setTimeout(() => { guideOverlay.classList.remove("success"); }, 400);

          sendQueue.push({ 
            qrValue: code.data, 
            modelCode: parsed.modelCode,       
            serialNumber: parsed.serialNumber, 
            col: 1, // 常に1列目スタート設定
            clientTime: clientTimeStr, 
            memo: locCode 
          });
          
          addHistoryLog(i18n[currentLang].log_hold + parsed.modelCode + " / " + parsed.serialNumber + " [" + locCode + "]", "wait");
        }
      } else { diagnoseImageError(); }
    }
    requestAnimationFrame(autoScanLoop);
  }

  function diagnoseImageError() {
    if (isSending) { logContainer.style.background = "#fff3cd"; logIcon.innerHTML = "🚀"; logText.style.color = "#e67e22"; logText.innerHTML = i18n[currentLang].cam_sending; return; }
    if (sendQueue.length > 0) { logContainer.style.background = "#e8f5e9"; logIcon.innerHTML = "📥"; logText.style.color = "#1a73e8"; logText.innerHTML = i18n[currentLang].cam_waiting.replace("{count}", sendQueue.length); return; }
    
    logContainer.style.background = "#ffffff"; logIcon.innerHTML = "🔍"; logText.style.color = "#37474f"; logText.innerHTML = i18n[currentLang].cam_guide;
  }

  // GASへの送信処理
  function processQueueBulk() {
    if (isSending || sendQueue.length === 0) return;
    isSending = true;
    const bulkData = [...sendQueue];
    const sendCount = bulkData.length;

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ dataList: bulkData }) })
    .then((response) => response.json())
    .then((res) => { sendQueue.splice(0, sendCount); addHistoryLog(i18n[currentLang].log_sync_ok.replace("{count}", sendCount), "ok"); })
    .catch((err) => { addHistoryLog(i18n[currentLang].log_sync_err, "ng"); })
    .finally(() => { isSending = false; });
  }
</script>
