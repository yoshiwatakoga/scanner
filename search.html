<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>在庫ロケーション検索システム - 可変マップ版</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 10px; text-align: center; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { margin-top: 0; color: #2c3e50; font-size: 1.4rem; }
    .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
    .search-box input { flex: 1; padding: 12px; font-size: 1.1rem; border: 2px solid #b0bec5; border-radius: 6px; box-sizing: border-box; }
    .search-box button { padding: 0 20px; font-size: 1.1rem; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .result-list { text-align: left; background: #f8f9fa; border: 1px solid #cfd8dc; border-radius: 6px; max-height: 120px; overflow-y: auto; margin-bottom: 15px; padding: 5px; font-size: 0.9rem; }
    .result-item { padding: 8px; border-bottom: 1px solid #eceff1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .result-item:last-child { border-bottom: none; }
    .result-item.active { background: #e3f2fd; font-weight: bold; border-left: 4px solid #1a73e8; }
    
    /* 可変型に対応した倉庫マップ外枠。列数が増えた場合は縦スクロールできるよう自動調整にします */
    .warehouse-map { position: relative; width: 100%; max-width: 360px; height: 500px; margin: 10px auto; background: #fafafa; border: 3px solid #34495e; border-radius: 8px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; }
    
    /* 固定パーツの配置調整 */
    .gate-bar { width: 100%; background: #eaeaea; padding: 8px 0; border-bottom: 2px solid #cfd8dc; font-weight: bold; color: #7f8c8d; font-size: 0.85rem; }
    
    /* マップのベースコンテナ（左右のサイドブロックと中央の通路） */
    .map-grid-container { display: flex; position: relative; width: 100%; padding: 10px; box-sizing: border-box; min-height: 440px; }
    .aisle { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 44px; border-left: 2px dashed #b0bec5; border-right: 2px dashed #b0bec5; background: #f1f2f6; z-index: 1; }
    .aisle-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); color: #95a5a6; font-size: 0.9rem; letter-spacing: 4px; font-weight: bold; white-space: nowrap; }
    
    /* 左右のブロック。列数が何個になっても等間隔で縦に綺麗に並べます */
    .side-block { width: 42%; display: flex; flex-direction: column; gap: 6px; z-index: 2; }
    .side-block-left { margin-right: auto; }
    .side-block-right { margin-left: auto; }
    
    /* 1つのブロック（マス）のデザイン */
    .shelf-slot { height: 45px; border: 2px solid #7f8c8d; background: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: #7f8c8d; border-radius: 6px; position: relative; box-sizing: border-box; transition: all 0.2s; }
    .shelf-slot.highlight { border-color: #e67e22; background: #fff5e6; color: #e67e22; font-size: 0.9rem; box-shadow: inset 0 0 8px rgba(230,126,34,0.2); }
    
    /* 点滅する赤い現在地ピン */
    .pin { position: absolute; width: 24px; height: 24px; background: #e74c3c; border: 3px solid white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.4); display: none; z-index: 10; animation: pulse 1.2s infinite; pointer-events: none; }
    @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.9; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.9; } }
    
    .status-msg { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; min-height: 20px; }
    .nav-link { margin-top: 15px; display: inline-block; color: #1a73e8; text-decoration: none; font-size: 0.95rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>倉庫ロケーション検索</h2>
  
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="型式または機番を入力 (例: 17280)" onkeypress="if(event.key==='Enter') searchLocation()">
    <button onclick="searchLocation()">検索</button>
  </div>

  <div class="status-msg" id="statusMsg">調べたい機番を入力してください</div>
  <div class="result-list" id="resultList">
    <div style="color:#aaa; text-align:center; padding:20px;">ここに検索結果が出ます</div>
  </div>

  <div class="warehouse-map" id="warehouseMapContainer">
    <div class="gate-bar">🚪 出入口 (奥方向へ連番)</div>
    
    <div class="map-grid-container">
      <div class="aisle"><span class="aisle-text">通路</span></div>
      
      <div class="side-block side-block-left" id="leftSide"></div>
      <div class="side-block side-block-right" id="rightSide"></div>
    </div>
    
    <div class="pin" id="mapPin"></div>
  </div>

  <a href="index.html" class="nav-link">📷 QRスキャン画面に戻る</a>
</div>

<script>
  // ★GASのウェブアプリURLをここに貼り付け
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwn8KmXLdJFWUG3zRi_HJrGvlcuKIut0od8Dzv-AO5vOjM2puq9IdpBbI_k_IXlyAkD/exec";
  
  let allStockData = [];

  window.onload = function() {
    fetch(GAS_URL)
      .then(response => response.json())
      .then(data => {
        allStockData = data;
        document.getElementById("statusMsg").innerText = "✓ 最新の在庫データを同期しました。";
        // 最初はデフォルトで5列分の枠を作っておく
        generateMapGrid(5);
      })
      .catch(err => {
        document.getElementById("statusMsg").innerText = "⚠️ データ同期エラー。電波の良い場所で試してください";
        generateMapGrid(5);
      });
  };

  // 【最重要】最大列数を自動判断して、HTMLのマス目をダイナミックに生成する関数
  function generateMapGrid(maxRow) {
    const leftSide = document.getElementById("leftSide");
    const rightSide = document.getElementById("rightSide");
    
    leftSide.innerHTML = "";
    rightSide.innerHTML = "";
    
    // 出入口が上部になったため、1列目（手前）から順番に下に並べます
    for (let i = 1; i <= maxRow; i++) {
      // 左側の枠作成
      const slotL = document.createElement("div");
      slotL.className = "shelf-slot";
      slotL.id = `slot-L-${i}`;
      slotL.innerText = `${i} 列目`;
      leftSide.appendChild(slotL);
      
      // 右側の枠作成
      const slotR = document.createElement("div");
      slotR.className = "shelf-slot";
      slotR.id = `slot-R-${i}`;
      slotR.innerText = `${i} 列目`;
      rightSide.appendChild(slotR);
    }
  }

  // 位置情報文字列から「何列目」の数字を取り出すヘルパー関数
  function parseRowNumber(locStr) {
    if (!locStr) return 0;
    // 「3号-右-17」のハイフンで区切られた3番目の要素、または「17列目」という文字から数字を抽出
    const parts = locStr.split("-");
    if (parts.length >= 3) {
      return parseInt(parts[2], 10) || 0;
    }
    const match = locStr.match(/(\d+)列目/);
    return match ? parseInt(match[1], 10) : 0;
  }

  function searchLocation() {
    const query = document.getElementById("searchInput").value.trim().toUpperCase();
    if(!query) return;
    
    const statusMsg = document.getElementById("statusMsg");
    const resultList = document.getElementById("resultList");
    
    hidePin();

    if(allStockData.length === 0) {
      statusMsg.innerText = "⏳ データの読み込み中です。数秒待って再度お試しください";
      return;
    }

    const matched = allStockData.filter(item => 
      (item.serial && item.serial.includes(query)) || (item.model && item.model.toUpperCase().includes(query))
    );

    if(matched.length === 0) {
      statusMsg.innerText = "❌ 該当する在庫が見つかりませんでした";
      resultList.innerHTML = `<div style="text-align:center; padding:20px; color:#e74c3c;">データがありません</div>`;
      return;
    }

    statusMsg.innerText = `💡 ${matched.length} 件見つかりました。タップで位置を表示`;
    resultList.innerHTML = "";
    
    // 見つかったデータの中から、最大の列数を自動スキャンして見つけ出します
    let detectedMaxRow = 5; // 最低表示ライン
    matched.forEach(item => {
      const rowNum = parseRowNumber(item.loc);
      if (rowNum > detectedMaxRow) {
        detectedMaxRow = rowNum;
      }
    });
    
    // 検出した最大列数でマップを再構築（例：17なら17行のマップに自動変形）
    generateMapGrid(detectedMaxRow);

    matched.forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "result-item";
      div.onclick = () => selectItem(item, div);
      
      div.innerHTML = `
        <div>
          <strong>${item.model}</strong> (機番: ${item.serial})<br>
          <small style="color:#7f8c8d;">${item.time ? item.time.split("T")[0] : ""}</small>
        </div>
        <div style="text-align:right; color:#1a73e8; font-weight:bold; font-size:1rem;">
          ${item.loc || "位置不明"}
        </div>
      `;
      resultList.appendChild(div);
    });
    
    selectItem(matched[0], resultList.firstChild);
  }

  function selectItem(item, element) {
    if (!item.loc) return;
    
    const items = document.querySelectorAll('.result-item');
    items.forEach(i => i.classList.remove('active'));
    if(element) element.classList.add('active');
    
    // 一度ハイライトをクリア
    const slots = document.querySelectorAll('.shelf-slot');
    slots.forEach(s => { 
      s.classList.remove('highlight'); 
      s.innerText = s.innerText.replace("★ ", ""); 
    });

    // 「右」か「左」かを判別
    const isRight = item.loc.includes("右側") || item.loc.includes("-右-");
    const side = isRight ? "R" : "L";
    
    // 対象の列番号を取得
    const slotNumber = parseRowNumber(item.loc);
    if (slotNumber === 0) return;

    const slotId = `slot-${side}-${slotNumber}`;
    const targetSlot = document.getElementById(slotId);
    
    if(targetSlot) {
      targetSlot.classList.add('highlight');
      targetSlot.innerText = "★ " + targetSlot.innerText;
      
      const pin = document.getElementById("mapPin");
      pin.style.display = "block";
      
      // スクロール対応したピンの絶対位置計算
      const mapContainer = document.getElementById("warehouseMapContainer");
      
      // 対象のスロットの位置までマップを自動スクロールさせて視認性を上げます
      targetSlot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      
      // スクロール完了後にピンが正しい位置に吸い付くよう、わずかに遅延して座標をセット
      setTimeout(() => {
        const mapRect = mapContainer.getBoundingClientRect();
        const slotRect = targetSlot.getBoundingClientRect();
        
        // コンテナのスクロール量を考慮してピンの配置を決定
        pin.style.left = (slotRect.left - mapRect.left + (slotRect.width / 2) - 12) + "px";
        pin.style.top = (slotRect.top - mapRect.top + mapContainer.scrollTop + (slotRect.height / 2) - 12) + "px";
      }, 200);
    }
  }

  function hidePin() {
    document.getElementById("mapPin").style.display = "none";
    const slots = document.querySelectorAll('.shelf-slot');
    slots.forEach(s => s.classList.remove('highlight'));
  }
</script>
</body>
</html>
